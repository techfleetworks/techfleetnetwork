name: npm audit

# Lightweight dependency vulnerability scan. Runs on every PR and weekly.
# Reports high+critical advisories. Does NOT fail the build automatically —
# upgrades go through standard PR review (no surprise dependency bumps).

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: .nvmrc

      - name: Run npm audit (high+critical, report-only)
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          AUDIT_EXIT=$?
          echo "npm audit exit code: $AUDIT_EXIT"
          # Always print a human summary; never fail the job.
          npm audit --audit-level=high || true
          exit 0

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 30
