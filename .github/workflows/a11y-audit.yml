name: WCAG 2.2 Accessibility Audit

# Phase 0 / Phase 3 of the accessibility conformance program.
#
# - Phase 0: a baseline scan of every route in the app, used to seed
#   guideline-by-guideline fix work.
# - Phase 3: re-runs on a schedule + on demand so regressions are caught
#   continuously. (A blocking PR-gate variant can be wired in later by
#   gating on a budget delta vs the last successful baseline.)
#
# Trigger manually from the Actions tab → "WCAG 2.2 Accessibility Audit"
# → "Run workflow". Output: an `a11y-report` artifact containing
# a11y-report/a11y-report.json with full per-route violation detail,
# plus a console summary in the run logs.
#
# Required GitHub Actions repository secrets:
#   TF_ADMIN_EMAIL     — admin login email (mdenner@techfleet.org)
#   TF_ADMIN_PASSWORD  — that account's password
# If either is missing the run still produces a partial baseline by
# scanning only public routes; authed routes are listed as "skipped".

on:
  workflow_dispatch:
  schedule:
    # Mondays at 06:00 UTC — weekly drift check. Cheap because it only
    # runs once a week, not per PR.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: axe-core scan (every route)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      # Surfaced to the spec at runtime. Falsy → public-only scan.
      TF_ADMIN_EMAIL: ${{ secrets.TF_ADMIN_EMAIL }}
      TF_ADMIN_PASSWORD: ${{ secrets.TF_ADMIN_PASSWORD }}
      # Supabase env vars required at Vite build time so the previewed
      # bundle can talk to Lovable Cloud. Without these the SPA loads
      # blank and every route reports the same "missing app" violations.
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        # actions/checkout@v5.0.0 — pinned SHA, runs on Node.js 24
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Node
        # actions/setup-node@v5.0.0 — pinned SHA, runs on Node.js 24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wipe stale a11y report
        # The repo ships a placeholder a11y-report/a11y-report.json so the
        # path exists for local dev. If a run aborts before the spec's
        # afterAll writes a fresh file, the upload-artifact step would
        # otherwise re-publish that stale stub and make it look like the
        # audit found zero issues. Always start from an empty directory.
        run: rm -rf a11y-report && mkdir -p a11y-report

      - name: Run WCAG audit
        # Only the a11y spec — keeps this job focused; the broader e2e
        # suite still runs in `regression.yml`. `|| true` so a failing
        # route test never prevents the artifact upload below — Phase 0
        # is a baseline, not a gate.
        #
        # NOTE: Playwright treats the positional arg as a *regex* against
        # test file paths. Passing `e2e/a11y/wcag-audit.spec.ts` raw made
        # the runner emit "No tests found" because the unescaped `.` and
        # `/` characters didn't line up with how `testMatch` resolves the
        # file under `testDir: "."`. Anchoring on the filename stem with
        # escaped dots (and `--` to stop shell/CLI flag parsing) matches
        # the single spec reliably across local + CI.
        run: npx playwright test --reporter=list -- "wcag-audit\.spec\.ts" || true

      - name: Upload a11y report
        if: always()
        # actions/upload-artifact@v5.0.0 — pinned SHA, runs on Node.js 24
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: a11y-report
          path: a11y-report/
          retention-days: 90
