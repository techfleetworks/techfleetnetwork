name: Regression

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

# OWASP CI/CD security: minimum permissions on every job. Each job opts into more.
permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v4.2.2 — pinned to commit SHA (OWASP CI/CD)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        # actions/setup-node@v4.1.0 — pinned to commit SHA
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package signatures (supply-chain)
        run: npm audit signatures
        continue-on-error: true # report-only until ecosystem maturity catches up

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Run Vitest regression suite
        run: npm run test

  sbom:
    runs-on: ubuntu-latest
    needs: vitest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate CycloneDX SBOM
        run: npm run sbom
      - name: Upload SBOM artifact
        # actions/upload-artifact@v4.4.3 — pinned
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: cyclonedx-sbom
          path: sbom.json
          retention-days: 90

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Dependency Review
        # actions/dependency-review-action@v4.5.0 — pinned
        uses: actions/dependency-review-action@4081bf99e2866ebe428fc0477b69eb4fcda7220a
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  playwright:
    runs-on: ubuntu-latest
    needs: vitest
    permissions:
      contents: read
    env:
      # Vite needs these at build time so the preview server (started by
      # playwright.config.ts webServer) renders a working app instead of
      # a blank shell that would fail every spec.
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright regression suite (incl. security tests)
        run: npx playwright test

  bdd-coverage:
    runs-on: ubuntu-latest
    needs: vitest
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate BDD coverage report
        run: npx tsx scripts/bdd-coverage.ts
