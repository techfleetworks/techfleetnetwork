<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Tech Fleet Network</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --fg: #e2e8f0;
      --primary: #6366f1;
      --muted: #64748b;
      --card-bg: #111827;
      --border: #1e293b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 28rem;
    }
    .logo {
      width: 5rem;
      height: 5rem;
      margin: 0 auto 2rem;
      border-radius: 1rem;
      background: var(--card-bg);
      padding: 0.75rem;
      border: 1px solid var(--border);
    }
    .logo img { width: 100%; height: 100%; }
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.938rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.9; }
    .tips {
      margin-top: 2.5rem;
      text-align: left;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
    }
    .tips h2 {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--fg);
    }
    .tips ul {
      list-style: none;
      padding: 0;
    }
    .tips li {
      color: var(--muted);
      font-size: 0.813rem;
      padding: 0.375rem 0;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .tips li::before { content: "•"; color: var(--primary); font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/tech-fleet-logo.svg" alt="Tech Fleet" />
    </div>
    <span class="icon" aria-hidden="true">📡</span>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be unavailable until you're back online.</p>
    <button class="btn" onclick="window.location.reload()">
      ↻ Try Again
    </button>
    <div class="tips">
      <h2>While you wait</h2>
      <ul>
        <li>Check your Wi-Fi or mobile data connection</li>
        <li>Try moving closer to your router</li>
        <li>Pages you've visited before may still be cached</li>
      </ul>
    </div>
  </div>
</body>
</html>
