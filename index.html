    <!--
      Content Security Policy.
      Applied via <meta http-equiv> so it works on hosts that don't honor public/_headers
      (e.g. the production Cloudflare deployment of techfleet.network). The header version
      in public/_headers stays in place for hosts that DO honor it (defense in depth).
      'unsafe-inline' on script-src is required for the cookieyes / gtag bootstrap snippets
      that live inline in this file; remove it if those move to external files.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://challenges.cloudflare.com https://www.googletagmanager.com https://www.clarity.ms https://*.clarity.ms https://cdn-cookieyes.com https://*.cookieyes.com; script-src-elem 'self' 'unsafe-inline' https://accounts.google.com https://challenges.cloudflare.com https://www.googletagmanager.com https://www.clarity.ms https://*.clarity.ms https://cdn-cookieyes.com https://*.cookieyes.com; style-src 'self' 'unsafe-inline' https://cdn-cookieyes.com; font-src 'self' data: https://cdn-cookieyes.com; img-src 'self' data: blob: https: https://iqsjhrhsjlgjiaedzmtz.supabase.co; media-src 'self' blob: https://iqsjhrhsjlgjiaedzmtz.supabase.co; connect-src 'self' https://iqsjhrhsjlgjiaedzmtz.supabase.co wss://iqsjhrhsjlgjiaedzmtz.supabase.co https://accounts.google.com https://challenges.cloudflare.com https://ai.gateway.lovable.dev https://api.firecrawl.dev https://www.google-analytics.com https://*.google-analytics.com https://stats.g.doubleclick.net https://www.clarity.ms https://*.clarity.ms https://cdn-cookieyes.com https://log.cookieyes.com https://*.cookieyes.com; frame-src 'self' https://accounts.google.com https://challenges.cloudflare.com https://calendar.google.com https://lu.ma https://luma.com https://www.youtube.com https://www.youtube-nocookie.com https://youtube.com; base-uri 'self'; form-action 'self'; manifest-src 'self'; object-src 'none'; worker-src 'self' blob:"
    />
    <title>Tech Fleet — Professional Training Platform</title>

    <!-- Structured data: Organization + WebSite -->

        "@context": "https://schema.org",

            "@type": "Organization",
            "name": "Tech Fleet",

            ]
          },

            "@type": "WebSite",
            "name": "Tech Fleet Network",
            "url": "https://techfleet.network",
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://techfleet.network/project-openings?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>

    <!-- Preconnect to backend + auth/captcha origins to cut handshake latency

    <!-- Self-hosted fonts (latin variable). Eliminates Google Fonts round-trip. -->
    <link rel="preload" href="/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/fonts.css" />

    <!-- Preload landing-page hero art so it arrives in parallel with the JS
         bundle instead of after React mounts. Eliminates the "pop-in" on first
         paint. Stable URLs in /public/hero/ (not Vite-hashed) so these links
         keep working across deploys. -->
    <link rel="preload" as="image" href="/hero/world.svg" type="image/svg+xml" fetchpriority="high" />
    <link rel="preload" as="image" href="/hero/sun.svg" type="image/svg+xml" fetchpriority="high" />

    <!--
      Blank-screen recovery (runs BEFORE any module script).
      Some returning users still have a legacy PWA / Workbox service worker
      installed from earlier deploys that intercepts /assets/* with stale
      cached responses pointing to chunk filenames that no longer exist on
      the CDN — producing a fully blank page because the entry script 404s
      before React can mount. This inline script:
        1. Synchronously unregisters every service worker on this origin.
        2. Clears every CacheStorage bucket.
        3. Listens for the entry <script type="module"> to fail and, if it
           does, performs ONE hard reload (tracked in sessionStorage) so the
           browser bypasses HTTP cache and fetches the live asset manifest.
      This is intentionally dependency-free and deferred-import-free so it
      cannot itself be broken by a stale chunk.
    -->
    <script>
      (function () {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { try { r.unregister(); } catch (e) {} });
            }).catch(function () {});
          }
          if (typeof caches !== 'undefined' && caches.keys) {
            caches.keys().then(function (names) {
              names.forEach(function (n) { try { caches.delete(n); } catch (e) {} });
            }).catch(function () {});
          }
        } catch (e) { /* non-fatal */ }

        // Pre-mount-only chunk-404 reloader.
        //
        // Firefox dispatches a bubbling `error` event on the <script> tag
        // for EVERY failed dynamic import — including the in-flight imports
        // that React Router fires when a user clicks a sidebar link. Chrome
        // surfaces those failures only as promise rejections, which
        // src/lib/lazy-with-retry.ts catches and retries. If we run this
        // inline handler post-mount, Firefox users get reloaded to the
        // CURRENT URL (pre-navigation) on every click of a stale chunk —
        // looking like "every link goes back to /dashboard". This handler
        // is therefore strictly scoped to the pre-mount window: it only
        // fires when the very first entry bundle 404s before React has
        // mounted. After mount, lazyWithRetry + ErrorBoundary own recovery.
        var RELOAD_KEY = '__tfn_blank_recovery_reload__';
        function isChunk404(target) {
          if (!target) return false;
          var src = target.src || target.href || '';
          // Ignore lazyWithRetry's own cache-busted retries (?_n=… or ?__r=…).
          if (/[?&](_n|__r)=/.test(src)) return false;
          return /\/assets\/.+\.(js|css)(\?|$)/.test(src);
        }
        function appMounted() {
          try {
            return !!(window.__tfnAppMounted) ||
              document.documentElement.getAttribute('data-tfn-mounted') === '1';
          } catch (e) { return false; }
        }
        window.addEventListener('error', function (ev) {
          // Post-mount: leave it to lazyWithRetry / ErrorBoundary.
          if (appMounted()) return;
          if (!isChunk404(ev.target)) return;
          try {
            if (sessionStorage.getItem(RELOAD_KEY)) return;
            sessionStorage.setItem(RELOAD_KEY, '1');
          } catch (e) { /* fall through */ }
          var url = new URL(window.location.href);
          url.searchParams.set('_r', String(Date.now()));
          window.location.replace(url.toString());
        }, true);
        // Clear the recovery flag a few seconds after the app has booted
        // (not just on `load` — load fires before React mounts and before
        // user-initiated lazy imports can fail). Clearing on `load` was
        // the second half of the Firefox loop: each click re-armed the
        // guard, then another stale chunk error re-tripped it.
        window.addEventListener('load', function () {
          setTimeout(function () {
            if (appMounted()) {
              try { sessionStorage.removeItem(RELOAD_KEY); } catch (e) {}
            }
          }, 10000);
        });

        // NOTE: The aggressive blank-screen watchdog was removed — it was
        // hard-reloading the page (with a `_w=` cache-bust) whenever React
        // took longer than 8s to mount on slow networks / cold caches,
        // producing a visible white-flash loop. Real stale-bundle recovery
        // is still handled by the chunk-404 listener above and by
        // src/lib/deploy-watcher.ts + src/lib/lazy-with-retry.ts.
        try { sessionStorage.removeItem('__tfn_blank_watchdog_reload__'); } catch (e) {}
      })();
    </script>
