    <!--
      Blank-screen recovery (runs BEFORE any module script).
      Some returning users still have a legacy PWA / Workbox service worker
      installed from earlier deploys that intercepts /assets/* with stale
      cached responses pointing to chunk filenames that no longer exist on
      the CDN — producing a fully blank page because the entry script 404s
      before React can mount. This inline script:
        1. Synchronously unregisters every service worker on this origin.
        2. Clears every CacheStorage bucket.
        3. Listens for the entry <script type="module"> to fail and, if it
           does, performs ONE hard reload (tracked in sessionStorage) so the
           browser bypasses HTTP cache and fetches the live asset manifest.
      This is intentionally dependency-free and deferred-import-free so it
      cannot itself be broken by a stale chunk.
    -->
    <script>
      (function () {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { try { r.unregister(); } catch (e) {} });
            }).catch(function () {});
          }
          if (typeof caches !== 'undefined' && caches.keys) {
            caches.keys().then(function (names) {
              names.forEach(function (n) { try { caches.delete(n); } catch (e) {} });
            }).catch(function () {});
          }
        } catch (e) { /* non-fatal */ }

        var RELOAD_KEY = '__tfn_blank_recovery_reload__';
        function isChunk404(target) {
          if (!target) return false;
          var src = target.src || target.href || '';
          return /\/assets\/.+\.(js|css)(\?|$)/.test(src);
        }
        window.addEventListener('error', function (ev) {
          if (!isChunk404(ev.target)) return;
          try {
            if (sessionStorage.getItem(RELOAD_KEY)) return;
            sessionStorage.setItem(RELOAD_KEY, '1');
          } catch (e) { /* fall through */ }
          var url = new URL(window.location.href);
          url.searchParams.set('_r', String(Date.now()));
          window.location.replace(url.toString());
        }, true);
        // Clear the recovery flag once the app successfully boots.
        window.addEventListener('load', function () {
          try { sessionStorage.removeItem(RELOAD_KEY); } catch (e) {}
        });

        // Mount watchdog — catches every other blank-screen cause that doesn't
        // surface as an asset error event (CSP refusals, module-eval throws,
        // hung top-level awaits, stale CDN HTML referencing chunks that 200
        // but fail to evaluate). If #root is still empty 8s after DOM parse,
        // hard-reload ONCE per tab with a fresh cache-bust query param.
        var WATCHDOG_KEY = '__tfn_blank_watchdog_reload__';
        function rootHasContent() {
          var root = document.getElementById('root');
          return !!(root && root.firstElementChild);
        }
        function hardReloadWithBust() {
          try {
            if (sessionStorage.getItem(WATCHDOG_KEY)) return;
            sessionStorage.setItem(WATCHDOG_KEY, '1');
          } catch (e) { /* ignore */ }
          var u = new URL(window.location.href);
          u.searchParams.set('_w', String(Date.now()));
          window.location.replace(u.toString());
        }
        // Also start a pre-DOM watchdog immediately. This catches parser-blocking
        // third-party scripts that can stall before <body>/<div id="root"> exist,
        // which otherwise produces a blank page with no React, console, or network
        // signal from inside the app.
        setTimeout(function () {
          if (!rootHasContent() && document.visibilityState !== 'hidden') {
            hardReloadWithBust();
          }
        }, 8000);

        // Run watchdog 8s after the document finishes parsing too, for slower
        // devices where parsing completes but React still fails to mount.
        document.addEventListener('DOMContentLoaded', function () {
          setTimeout(function () {
            if (!rootHasContent() && document.visibilityState !== 'hidden') {
              hardReloadWithBust();
            }
          }, 8000);
          // Once React mounts, drop the flag so future blank states can recover.
          var clearObserver = new MutationObserver(function () {
            if (rootHasContent()) {
              try { sessionStorage.removeItem(WATCHDOG_KEY); } catch (e) {}
              clearObserver.disconnect();
            }
          });
          var rootEl = document.getElementById('root');
          if (rootEl) clearObserver.observe(rootEl, { childList: true });
        });
      })();
    </script>

    <!--
      CookieYes consent banner. Renders the visible cookie UI, persists the
      user's category choices in `cookieyes-consent`, and emits
      `cookieyes_consent_update` events. Our app listens for those events in
      src/components/CookieConsentBanner.tsx and only then loads GA4 +
      Microsoft Clarity (via src/lib/consent/loadAnalytics.ts). Global
      Privacy Control still force-denies analytics regardless of CookieYes.
    -->
    <!--
      Load CookieYes ONLY on the registered production hostnames. The script
      hard-throws on every other origin (lovable preview/sandbox URLs) with
      "your website URL has changed" — noisy in console and surfaced as an
      error to triage. Our internal CookieConsentBanner still works without it.
    -->
    <script>
      (function () {
        var h = location.hostname;
        if (h === 'techfleet.network' || h === 'www.techfleet.network' || h === 'techfleetnetwork.lovable.app') {
          var s = document.createElement('script');
          s.id = 'cookieyes';
          s.type = 'text/javascript';
          s.async = true;
          s.src = 'https://cdn-cookieyes.com/client_data/845235fa228394cced00be3e4d1ac9c3/script.js';
          document.head.appendChild(s);
        }
      })();
    </script>
